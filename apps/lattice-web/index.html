<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP is NOT set via meta tag. Trunk injects an inline bootstrap
      module with a per-request nonce, so a static meta CSP cannot
      allowlist it. Production CSP is emitted by the home server as a
      `Content-Security-Policy` HTTP header, computed from the actual
      built bundle's SHA-384 hashes (see `csp.json` and
      `scripts/verify-csp.ps1`). The header-based policy is strict:
      no `'unsafe-inline'`, no `'unsafe-eval'`, allowlisted origins.
    -->
    <meta name="referrer" content="no-referrer" />
    <title>Lattice</title>
    <link data-trunk rel="rust" data-bin="lattice-web" />
    <link data-trunk rel="css" href="styles.css" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
