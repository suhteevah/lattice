<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Production CSP is served by the host server (see csp.json). The meta
      tag below is a belt-and-suspenders fallback that mirrors the policy
      so even mis-configured hosts get a baseline.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss:; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
    />
    <meta name="referrer" content="no-referrer" />
    <title>Lattice</title>
  </head>
  <body class="bg-ink-950 text-ink-50 font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
